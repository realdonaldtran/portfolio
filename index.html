<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name – Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      color: #222;
    }
    header {
      padding: 60px 20px;
      text-align: center;
      background: white;
    }
    h1 {
      margin: 0;
      font-size: 36px;
    }
    p {
      color: #666;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      transition: 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    footer {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    a {
      text-decoration: none;
      color: black;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Graphic Designer • Production • Transitioning into Data + Frontend</p>
</header>

<div class="container">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card">
      <h3>Project One</h3>
      <p>Short description of your work.</p>
    </div>
    <div class="card">
      <h3>Project Two</h3>
      <p>Short description of your work.</p>
    </div>
    <div class="card">
      <h3>Project Three</h3>
      <p>Short description of your work.</p>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
